<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Prevent scrollbars */
            background-color: #f0f0f0; /* Optional: Light gray background */
        }
        canvas {
            display: block; /* Removes default inline spacing */
        }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ------------------------------------------------
        // 1. CONFIGURATION: EDIT THIS SECTION
        // ------------------------------------------------
        
        // RELACE 'model.glb' with the actual filename of your 3D model
        const MODEL_PATH = 'model.glb'; 
        
        const BACKGROUND_COLOR = 0xf0f0f0;
        const LIGHT_INTENSITY = 2;

        // ------------------------------------------------
        // 2. SETUP SCENE, CAMERA, AND RENDERER
        // ------------------------------------------------
        const scene = new THREE.Scene();
        // Generate a random background color (using HSL makes it easier to keep it soft/dark)
        const bgColor = new THREE.Color().setHSL(Math.random(), 0.2, 0.9); // Light, desaturated color
        scene.background = bgColor;

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; // Initial camera position (moves back to see model)

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Sharpness on high DPI screens
        document.body.appendChild(renderer.domElement);

        // ------------------------------------------------
        // 3. LIGHTING
        // ------------------------------------------------
        
        // Ambient light (soft general light)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1); 
        scene.add(ambientLight);

        // Directional light (simulates sun/lamp)
        const dirLight = new THREE.DirectionalLight(0xffffff, LIGHT_INTENSITY);
        dirLight.position.set(5, 10, 7.5);
        scene.add(dirLight);

        // ------------------------------------------------
        // 4. LOAD THE MODEL
        // ------------------------------------------------
        
        const loader = new GLTFLoader();
        
        loader.load(MODEL_PATH, (gltf) => {
            const model = gltf.scene;
        
            // Generate a vibrant random color for the model
            // Using HSL: (Hue 0-1, Saturation 0.7, Lightness 0.5) ensures it's always colorful
            const modelColor = new THREE.Color().setHSL(Math.random(), 0.7, 0.5);
        
            model.traverse((node) => {
                if (node.isMesh) {
                    // Remove existing textures so the random color is solid and bright
                    node.material.map = null; 
                    node.material.color = modelColor;
                    
                    // Optional: Make it slightly shiny
                    if (node.material.roughness !== undefined) node.material.roughness = 0.3;
                }
            });
        
            // --- AUTO-CENTERING LOGIC ---
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.x += (model.position.x - center.x);
            model.position.y += (model.position.y - center.y);
            model.position.z += (model.position.z - center.z);
        
            scene.add(model);
        
        }, undefined, (error) => {
            console.error('An error occurred:', error);
        });

        // ------------------------------------------------
        // 5. CONTROLS (INTERACTION + ROTATION)
        // ------------------------------------------------
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Smooths the movement
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;    // Enables the slow rotation
        controls.autoRotateSpeed = 2.0; // Adjust speed (2.0 is default)

        // ------------------------------------------------
        // 6. ANIMATION LOOP & RESIZE
        // ------------------------------------------------

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for damping and autoRotate
            renderer.render(scene, camera);
        }
        animate();

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
